controller:
  service:
    # Key setting: set load balancer type to 'nlb'
    annotations:
      oci.oraclecloud.com/load-balancer-type: "nlb"
      oci.oraclecloud.com/security-rule-management-mode: "NSG"
      # NLB does not require Flexible Shape settings (Mbps); safe to remove
      # Recommend Local traffic policy (preserves client IP)
    externalTrafficPolicy: Local
    
    # NLB is L4, so keep HTTP/HTTPS ports exposed as-is.
    ports:
      http: 80
      https: 443
  
