apiVersion: batch/v1
kind: Job
metadata:
  name: url-shortener-migrate
  namespace: url-shortener
spec:
  backoffLimit: 1
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Never
      imagePullSecrets:
        - name: ocir-secret
      containers:
        - name: migrate
          image: phx.ocir.io/ax4dlruayn0q/url-shortener-repository:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: url-shortener-secrets
            - configMapRef:
                name: url-shortener-config
