apiVersion: v1
kind: Secret
type: Opaque
metadata:
  name: urlshortener-secrets
  namespace: urlshortener
stringData:
  # Point to your RDS/PostgreSQL instance
  DATABASE_URL: 'postgresql://urlshortener-postgres-user:supersecret@postgres-service:5432/urlshortener-postgres-db?connection_limit=5'
  POSTGRES_USER: urlshortener-postgres-user
  POSTGRES_PASSWORD: supersecret
  POSTGRES_DB: urlshortener-postgres-db
