apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: urlshortener-hpa
  namespace: urlshortener
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: urlshortener-deployment
  minReplicas: 2
  maxReplicas: 10   # 로컬이라도 이 정도까지는 실험 가능
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60  # 파드 평균 CPU 60% 넘으면 늘리기
