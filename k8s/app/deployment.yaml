apiVersion: apps/v1
kind: Deployment
metadata:
  name: urlshortener-deployment
  namespace: urlshortener
  labels:
    app: urlshortener-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: urlshortener-app
  template:
    metadata:
      labels:
        app: urlshortener-app
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: urlshortener-container
          image: url-shortener:dev
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: urlshortener-config
            - secretRef:
                name: urlshortener-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1
              memory: 512Mi
      terminationGracePeriodSeconds: 30
