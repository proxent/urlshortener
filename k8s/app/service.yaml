apiVersion: v1
kind: Service
metadata:
  name: urlshortener-service
  namespace: urlshortener
  labels:
    app: urlshortener-app
spec:
  selector:
    app: urlshortener-app
  ports:
    - protocol: TCP
      port: 80 # Port exposed inside the cluster
      targetPort: 3000
  type: ClusterIP
  # type: LoadBalancer # Use this to provision a cloud load balancer
  # type: NodePort # Use this to expose via a node port on each node
  # Default type is ClusterIP; change as needed.
  # LoadBalancer/NodePort create externally reachable endpoints.
