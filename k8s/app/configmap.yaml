apiVersion: v1
kind: ConfigMap
metadata:
  name: urlshortener-config
  namespace: urlshortener
data:
  NODE_ENV: 'production'
  PORT: '3000'
  # Replace with the public URL that fronts this service (must not be localhost in production)
  BASE_URL: 'https://short.example.com'
  TRUST_PROXY: '1'
  RATE_LIMIT_WINDOW_MS: '60000'
  RATE_LIMIT_MAX_SHORTEN: '60'
