apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: url-shortener
  namespace: url-shortener
  labels:
    app: url-shortener
spec:
  namespaceSelector:
    matchNames:
      - url-shortener
  selector:
    matchLabels:
      app: url-shortener
  endpoints:
    - port: http
      path: /metrics
      interval: 10s
      scrapeTimeout: 5s
      scheme: http
