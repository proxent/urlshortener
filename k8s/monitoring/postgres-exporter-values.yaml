service:
  type: ClusterIP
  port: 80
  targetPort: 9187
  name: http
  labels:
    monitoring: postgres-exporter

extraEnvs:
  - name: DATA_SOURCE_NAME
    valueFrom:
      secretKeyRef:
        name: postgres-exporter-dsn
        key: DATABASE_URL
  - name: PG_EXPORTER_COLLECTION_TIMEOUT
    value: 10s

config:
  extraArgs:
    - --collector.locks
    - --collector.long_running_transactions
    - --collector.stat_activity_autovacuum
    - --collector.stat_statements
    # Enable only for short, focused investigations.
    # It adds query text as a label and can create very high Prometheus cardinality.
    # - --collector.stat_statements.include_query

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
