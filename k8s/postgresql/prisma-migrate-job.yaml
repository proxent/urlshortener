apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: urlshortener
spec:
  backoffLimit: 3  # 실패하면 최대 3번까지 재시도
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: prisma-migrate
          image: url-shortener:dev  # 👉 여기를 너의 앱 이미지 이름으로 바꿔줘
          command: ["pnpm"]
          args: ["prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL
          # 필요하면 NODE_ENV 등 다른 env도 여기서 넣어줄 수 있음
