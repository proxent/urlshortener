apiVersion: batch/v1
kind: Job
metadata:
  name: prisma-migrate
  namespace: urlshortener
spec:
  backoffLimit: 3  # Retry up to 3 times on failure
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: prisma-migrate
          image: url-shortener:dev  # Replace with your application image name
          command: ["pnpm"]
          args: ["prisma", "migrate", "deploy"]
          env:
            - name: DATABASE_URL
              value: "postgresql://urlshortener-postgres-user:supersecret@postgres-service:5432/urlshortener-postgres-db"  # Replace with your database URL
          # Add other env vars here if needed (for example NODE_ENV)
