# eks/cluster.yaml
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: urlshortener-cluster # Cluster name (change if needed)
  region: us-west-2 # US West (Oregon) region
  version: '1.32' # One of the currently standard-supported EKS versions

# Enabling IRSA (OIDC) is a current best practice
# - Needed later when granting S3/SQS/Dynamo permissions per ServiceAccount
iam:
  withOIDC: true

# Send control plane logs to CloudWatch (helps operations/debugging)
cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler

# One managed EKS node group (most basic setup)
managedNodeGroups:
  - name: ng-1
    amiFamily: AmazonLinux2 # Default EKS AL2 AMI (good for practice)
    instanceType: t3.small # Low-cost spec for practice
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 20 # Root disk 20GiB (increase if needed)

    # Pattern: place worker nodes in private subnets (no public IP -> better security)
    privateNetworking: true

    # Required later for components like ALB Ingress Controller, Cluster Autoscaler, CW Agent
    # Options to enable IAM addon policies in advance
    iam:
      withAddonPolicies:
        albIngress: true # Permission used by AWS Load Balancer Controller
        autoScaler: true # For Cluster Autoscaler
        ebs: true # When using EBS volumes (persistent volumes)
        cloudWatch: true # For CloudWatch agent/metrics

    # Nice to have but optional (fill in later if desired)
    labels:
      role: worker
      app: urlshortener

    tags:
      project: urlshortener
      env: dev
