# eks/cluster.yaml
apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: urlshortener-cluster # Cluster name (change if needed)
  region: us-west-2 # US West (Oregon) region
  version: '1.32' # One of the currently standard-supported EKS versions

# Enabling IRSA (OIDC) is current best practice
# - Required when granting AWS permissions per ServiceAccount later
iam:
  withOIDC: true

# Send control plane logs to CloudWatch (useful for ops/debugging)
cloudWatch:
  clusterLogging:
    enableTypes:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler

# One EKS managed node group (basic setup)
managedNodeGroups:
  - name: ng-1
    amiFamily: AmazonLinux2 # Default EKS AL2 AMI (reasonable for practice)
    instanceType: t3.small # Budget-friendly instance for practice
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 20 # Root disk 20GiB (increase if needed)

    # Place worker nodes in private subnets (no public IPs -> more secure)
    privateNetworking: true

    # Needed later for ALB Ingress Controller, Cluster Autoscaler, CW Agent, etc.
    # Options to enable IAM addon policies ahead of time
    iam:
      withAddonPolicies:
        albIngress: true # Permissions used by AWS Load Balancer Controller
        autoScaler: true # For Cluster Autoscaler
        ebs: true # For EBS volume usage (persistent volumes)
        cloudWatch: true # For CloudWatch agent/metrics

    # Nice to have, optional (fill in later if desired)
    labels:
      role: worker
      app: urlshortener

    tags:
      project: urlshortener
      env: dev
