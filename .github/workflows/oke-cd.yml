name: OKE CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: url-shortener

jobs:
  build-push:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCIR_REGISTRY }}
          username: ${{ secrets.OCIR_USERNAME }}
          password: ${{ secrets.OCIR_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPOSITORY || env.IMAGE_NAME }}
          tags: |
            type=sha
            type=ref,event=branch

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Update deployment image tag for Argo CD
        env:
          IMAGE_REPO: ${{ secrets.OCIR_REGISTRY }}/${{ secrets.OCIR_NAMESPACE }}/${{ secrets.OCIR_REPOSITORY || env.IMAGE_NAME }}
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
        run: |
          IMAGE_URI="${IMAGE_REPO}:${IMAGE_TAG}"
          sed -i "s|^\(\s*image:\s*\).*|\1${IMAGE_URI}|" k8s/oke/deployment.yaml

      - name: Commit and push manifest update
        run: |
          if git diff --quiet -- k8s/oke/deployment.yaml; then
            echo "No manifest change detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/oke/deployment.yaml
          git commit -m "chore(cd): update deployment image to ${GITHUB_SHA::7}"
          git push
