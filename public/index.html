<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>URL Shortener</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 40px auto;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
    }

    button {
      padding: 8px 12px;
      margin-top: 12px;
    }

    #links li {
      margin-bottom: 10px;
    }

    .meta {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>
  <h1>URL Shortener</h1>

  <!-- URL input -->
  <label>Original URL:</label>
  <input id="urlInput" placeholder="https://example.com" />

  <button id="createBtn">Create Short URL</button>

  <!-- Result output -->
  <div id="result" style="margin-top: 16px"></div>

  <h2 style="margin-top: 32px">Link List</h2>
  <button id="refreshBtn">Refresh</button>
  <ul id="links"></ul>

  <script>
    const urlInput = document.getElementById("urlInput");
    const createBtn = document.getElementById("createBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const result = document.getElementById("result");
    const linksList = document.getElementById("links");

    // Create short URL
    async function createShortUrl(url) {
      const res = await fetch("/shorten", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ url }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "An error occurred");

      return data;
    }

    // Fetch links
    async function fetchLinks() {
      const res = await fetch("/links");
      return res.json();
    }

    // Render links
    function renderLinks(links) {
      linksList.innerHTML = "";

      if (links.length === 0) {
        linksList.innerHTML = "<li>No links have been created yet.</li>";
        return;
      }

      links.forEach((link) => {
        const li = document.createElement("li");

        li.innerHTML = `
            <a href="${link.shortUrl}" target="_blank">${link.shortUrl}</a>
            &nbsp; → &nbsp;
            ${link.originalUrl}
            <div class="meta">Clicks: ${link.hitCount}</div>
          `;

        linksList.appendChild(li);
      });
    }

    // Create short URL button click
    createBtn.addEventListener("click", async () => {
      const url = urlInput.value.trim();
      if (!url) {
        result.textContent = "Please enter a URL.";
        return;
      }

      result.textContent = "Creating...";

      try {
        const data = await createShortUrl(url);

        result.innerHTML = `
            Short URL created:<br/>
            <a href="${data.shortUrl}" target="_blank">${data.shortUrl}</a>
          `;

        urlInput.value = "";

        // Refresh list
        const links = await fetchLinks();
        renderLinks(links);
      } catch (err) {
        result.textContent = err.message;
      }
    });

    // Refresh button
    refreshBtn.addEventListener("click", async () => {
      const links = await fetchLinks();
      renderLinks(links);
    });

    // Auto-load list on page load
    (async () => {
      const links = await fetchLinks();
      renderLinks(links);
    })();
  </script>
</body>

</html>
