<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>URL Shortener</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: 40px auto;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
    }

    button {
      padding: 8px 12px;
      margin-top: 12px;
    }

    #links li {
      margin-bottom: 10px;
    }

    .meta {
      font-size: 12px;
      color: gray;
    }

    #result {
      margin-top: 16px;
    }

    h2 {
      margin-top: 32px;
    }
  </style>
</head>

<body>
  <h1>URL Shortener</h1>

  <!-- URL input -->
  <label>Original URL:</label>
  <input id="urlInput" placeholder="https://example.com" />

  <button id="createBtn">Create Short URL</button>

  <!-- Result output -->
  <div id="result"></div>

  <h2>Link List</h2>
  <button id="refreshBtn">Refresh</button>
  <ul id="links"></ul>
  <script src="/app.js" defer></script>
</body>

</html>
