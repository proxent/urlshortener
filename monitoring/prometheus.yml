global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: url-shortener
    scheme: https
    metrics_path: /metrics
    static_configs:
      - targets:
          - 141-148-185-116.nip.io

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187
